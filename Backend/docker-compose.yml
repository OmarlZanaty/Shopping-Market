version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shoppingmarket-db
    restart: always
    environment:
      POSTGRES_DB: shopping_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: StrongPostgresPassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shoppingmarket-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: shoppingmarket-backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - staticfiles:/app/static
      - mediafiles:/app/media
    ports:
      - "8000:8000"
    # migrate + collectstatic must succeed; seeding is best-effort so a seed
    # hiccup can't black out the API. Served by gunicorn with 3 Uvicorn workers
    # and a 60s request timeout: one hung worker is killed + respawned instead
    # of wedging the whole site (the old single bare-uvicorn worker could hang
    # with the container still "Up", which restart:always never caught).
    # NOTE: keep the gunicorn invocation on ONE line. A YAML folded scalar
    # preserves newlines on extra-indented lines, which would split the flags
    # off inside `sh -c "..."` and silently drop -k (gunicorn then falls back to
    # its sync WSGI worker and fails on the ASGI app).
    command:
      - sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        (python manage.py seed_default_store || echo '[startup] seed_default_store skipped') &&
        exec gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --workers 3 --bind 0.0.0.0:8000 --timeout 60 --graceful-timeout 30 --access-logfile - --error-logfile -
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=4).status==200 else 1)\""]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 45s

  celery-worker:
    build: .
    container_name: shoppingmarket-celery
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  celery-beat:
    build: .
    container_name: shoppingmarket-beat
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l info

  admin:
    build:
      context: ../Admin Dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://63.186.157.245/api/v1
    container_name: shoppingmarket-admin
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: shoppingmarket-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - staticfiles:/app/static:ro
      - mediafiles:/app/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  mediafiles:
