# NOTE: We intentionally do NOT use `upstream {}` blocks with a static hostname.
# nginx resolves an upstream hostname only once at startup and caches the IP
# forever, so when a backend/admin container restarts and Docker gives it a new
# IP, nginx keeps proxying to the dead old IP → 502 until nginx is restarted.
# Using `set $var` + `proxy_pass $var` with Docker's embedded DNS resolver forces
# nginx to re-resolve the IP at request time, so container restarts just work.
resolver 127.0.0.11 valid=10s ipv6=off;   # Docker's embedded DNS

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # ── Django static & media ─────────────────────────────────────────────────
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Backend: API + Django admin + WebSocket ───────────────────────────────
    location ~ ^/(api|django-admin)/ {
        set $django http://shoppingmarket-backend:8000;
        proxy_pass $django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        set $django_ws http://shoppingmarket-backend:8000;
        proxy_pass $django_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Admin SPA (all other routes) ─────────────────────────────────────────
    location / {
        set $admin_spa http://shoppingmarket-admin:80;
        proxy_pass $admin_spa;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
