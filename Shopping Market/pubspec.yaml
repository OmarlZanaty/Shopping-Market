name: market_fresh
description: Market Fresh - Smart Supermarket Delivery App
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^12.1.3

  # Network
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Auth & Social
  google_sign_in: ^6.2.1
  #flutter_facebook_auth: ^6.1.0
  local_auth: ^2.1.8

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Firebase & Notifications
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.8
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.4
  awesome_notifications: ^0.11.0

  # Barcode Scanner
  mobile_scanner: ^3.5.7

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0

  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2

  # Payments
  url_launcher: ^6.2.4

  # Utils
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

dependency_overrides:
  intl: ^0.20.2