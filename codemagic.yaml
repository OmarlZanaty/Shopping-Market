workflows:
  ios-customer-release:
    name: iOS Customer – App Store / TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    # The Flutter customer app lives in this subfolder of the repo.
    working_directory: "Shopping Market"
    integrations:
      # This name MUST match the App Store Connect API key you add in
      # Codemagic → Teams/User settings → Integrations → App Store Connect.
      app_store_connect: ShoppingMarket ASC Key
    environment:
      # NOTE: no `ios_signing:` block on purpose. That block makes Codemagic
      # run a pre-flight "fetch existing profiles" that fails on a fresh account
      # ("No matching profiles found"). Instead we create the cert+profile in
      # the "Set up code signing" script below via the App Store Connect API key.
      #
      # `ios_signing` (Codemagic env var group, unrelated to the
      # `ios_signing:` keyword above) supplies IOS_DIST_CERT_KEY — a
      # persistent private key so every build reuses the same Distribution
      # certificate instead of minting a new one each run. Without it we hit
      # Apple's 2-certificate cap after a few builds ("You already have a
      # current Distribution certificate or a pending certificate request").
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.almobarmg.shoppingmarket"
      flutter: stable
      # Xcode 16.4 (iOS 18.5 SDK) is no longer accepted by App Store Connect —
      # Apple now requires the iOS 26 SDK (Xcode 26+) for all new uploads
      # (upload of build 16 rejected with "SDK version issue" 409). `latest`
      # was previously avoided because Swift Package Manager's module
      # interfaces clashed with this app's bridging header, but SPM is
      # already disabled below (`flutter config --no-enable-swift-package-manager`),
      # so that failure mode shouldn't apply here.
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          # Disable Flutter's Swift Package Manager integration. These plugins
          # are CocoaPods-only, and SPM's module interfaces clash with the app's
          # bridging header ("Using bridging headers with module interfaces is
          # unsupported"). CocoaPods handles everything.
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: iOS sign-in regression test (real iOS runtime, no device needed)
        script: |
          # Guards against a repeat of the App Review 2.1(a) rejections
          # (builds 13-18): the phone-sign-in hang only ever showed up on iOS,
          # never in Android testing, so "verified on Android" kept shipping
          # builds that failed again in front of App Review. This runs the
          # actual sign-in chain (integration_test/ios_phone_signin_test.dart)
          # on an iOS Simulator — same Dart engine and platform channels as a
          # physical device, just without needing one. A hang or failure here
          # stops the workflow before code signing / IPA build / TestFlight
          # publish, so a broken build never reaches App Review.
          # This build image ships Xcode's device types/runtimes but no
          # pre-created simulator *instance* — `-d "iPhone"` found nothing,
          # and a UDID scraped from a stale `simctl list devices available`
          # entry wasn't recognized by xcodebuild's destination resolver
          # either ("Unable to find a destination matching..."). Create a
          # fresh device from Xcode's own device type + runtime lists, so
          # it's guaranteed to be a combination Xcode itself considers valid.
          DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | grep -m1 -E "iPhone 1[5-9]" | sed -E 's/.*\(([^)]+)\)/\1/')
          [ -z "$DEVICE_TYPE_ID" ] && DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | grep -m1 "iPhone" | sed -E 's/.*\(([^)]+)\)/\1/')
          RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS " | tail -1 | sed -E 's/.*\(([^)]+)\) - .*/\1/')
          echo "Using device type: $DEVICE_TYPE_ID, runtime: $RUNTIME_ID"
          UDID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          flutter test integration_test/ios_phone_signin_test.dart -d "$UDID"
      - name: Capture authentic iOS status bar reference (Guideline 2.3.10 fix)
        script: |
          # App Review's 2.3.10 rejection: the App Store marketing screenshots
          # use an illustrated status bar (hand-drawn signal/wifi/battery
          # icons) instead of a genuine iOS render — "non-iOS status bar
          # images". Capture a real iOS Simulator screenshot with the
          # standard App Store status bar (9:41, full signal/wifi/battery) to
          # use directly as an App Store screenshot in place of the flagged
          # illustrated ones — the 5 marketing templates turned out to use
          # different phone-frame geometry each, so compositing a real status
          # bar onto them isn't a safe pixel-for-pixel operation.
          # Reuse whatever simulator the previous step already created and
          # booted (env vars don't persist between Codemagic script steps,
          # so re-query "booted" state rather than reading $UDID directly).
          # Fall back to creating a fresh one the same way if none is booted
          # — see the regression-test step's comment for why we create a
          # device from Xcode's own device type + runtime lists instead of
          # hand-picking a UDID from `simctl list devices available`.
          UDID=$(xcrun simctl list devices booted | grep -m1 "iPhone" | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          if [ -z "$UDID" ]; then
            echo "No booted iPhone simulator found — creating one"
            DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | grep -m1 -E "iPhone 1[5-9]" | sed -E 's/.*\(([^)]+)\)/\1/')
            [ -z "$DEVICE_TYPE_ID" ] && DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | grep -m1 "iPhone" | sed -E 's/.*\(([^)]+)\)/\1/')
            RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS " | tail -1 | sed -E 's/.*\(([^)]+)\) - .*/\1/')
            UDID=$(xcrun simctl create "CI-iPhone-2" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
            xcrun simctl boot "$UDID"
            xcrun simctl bootstatus "$UDID" -b
          fi
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --dataNetwork wifi --wifiMode active --wifiBars 3 \
            --cellularMode active --cellularBars 4 \
            --batteryState charged --batteryLevel 100
          flutter build ios --debug --simulator
          APP_PATH=$(find build/ios/iphonesimulator -maxdepth 1 -name "*.app" | head -1)
          xcrun simctl install "$UDID" "$APP_PATH"
          BUNDLE_ID_INSTALLED=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist")
          xcrun simctl launch "$UDID" "$BUNDLE_ID_INSTALLED"
          sleep 8
          mkdir -p /tmp/status_bar_reference
          xcrun simctl io "$UDID" screenshot /tmp/status_bar_reference/ios_status_bar_reference.png
          xcrun simctl terminate "$UDID" "$BUNDLE_ID_INSTALLED" || true
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          # Prefer a persistent key from env (IOS_DIST_CERT_KEY) so the cert is
          # reused across builds; fall back to a fresh key if it isn't set.
          if [ -n "$IOS_DIST_CERT_KEY" ]; then
            printf '%s' "$IOS_DIST_CERT_KEY" | openssl base64 -d -A > /tmp/cert_key.pem
          else
            openssl genrsa 2048 > /tmp/cert_key.pem 2>/dev/null
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
      - /tmp/status_bar_reference/*.png
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight automatically. Flip to a production
        # submission later once TestFlight looks good.
        submit_to_testflight: true
        # Leave beta groups empty until you create one in App Store Connect.
