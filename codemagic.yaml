workflows:
  ios-customer-release:
    name: iOS Customer – App Store / TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    # The Flutter customer app lives in this subfolder of the repo.
    working_directory: "Shopping Market"
    integrations:
      # This name MUST match the App Store Connect API key you add in
      # Codemagic → Teams/User settings → Integrations → App Store Connect.
      app_store_connect: ShoppingMarket ASC Key
    environment:
      # NOTE: no `ios_signing:` block on purpose. That block makes Codemagic
      # run a pre-flight "fetch existing profiles" that fails on a fresh account
      # ("No matching profiles found"). Instead we create the cert+profile in
      # the "Set up code signing" script below via the App Store Connect API key.
      vars:
        BUNDLE_ID: "com.almobarmg.shoppingmarket"
      flutter: stable
      # Pin Xcode to a stable release. `latest` (Xcode 26 / Swift 6 toolchain)
      # fails with "Using bridging headers with module interfaces is unsupported".
      # 16.4 still ships the iOS 18 SDK required for App Store submission.
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          # Disable Flutter's Swift Package Manager integration. These plugins
          # are CocoaPods-only, and SPM's module interfaces clash with the app's
          # bridging header ("Using bridging headers with module interfaces is
          # unsupported"). CocoaPods handles everything.
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          # Prefer a persistent key from env (IOS_DIST_CERT_KEY) so the cert is
          # reused across builds; fall back to a fresh key if it isn't set.
          if [ -n "$IOS_DIST_CERT_KEY" ]; then
            printf '%s' "$IOS_DIST_CERT_KEY" | openssl base64 -d -A > /tmp/cert_key.pem
          else
            openssl genrsa 2048 > /tmp/cert_key.pem 2>/dev/null
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight automatically. Flip to a production
        # submission later once TestFlight looks good.
        submit_to_testflight: true
        # Leave beta groups empty until you create one in App Store Connect.
