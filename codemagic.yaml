workflows:
  ios-customer-release:
    name: iOS Customer – App Store / TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    # The Flutter customer app lives in this subfolder of the repo.
    working_directory: "Shopping Market"
    integrations:
      # This name MUST match the App Store Connect API key you add in
      # Codemagic → Teams/User settings → Integrations → App Store Connect.
      app_store_connect: ShoppingMarket ASC Key
    environment:
      # NOTE: no `ios_signing:` block on purpose. That block makes Codemagic
      # run a pre-flight "fetch existing profiles" that fails on a fresh account
      # ("No matching profiles found"). Instead we create the cert+profile in
      # the "Set up code signing" script below via the App Store Connect API key.
      #
      # `ios_signing` (Codemagic env var group, unrelated to the
      # `ios_signing:` keyword above) supplies IOS_DIST_CERT_KEY — a
      # persistent private key so every build reuses the same Distribution
      # certificate instead of minting a new one each run. Without it we hit
      # Apple's 2-certificate cap after a few builds ("You already have a
      # current Distribution certificate or a pending certificate request").
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.almobarmg.shoppingmarket"
      flutter: stable
      # Xcode 16.4 (iOS 18.5 SDK) is no longer accepted by App Store Connect —
      # Apple now requires the iOS 26 SDK (Xcode 26+) for all new uploads
      # (upload of build 16 rejected with "SDK version issue" 409). `latest`
      # was previously avoided because Swift Package Manager's module
      # interfaces clashed with this app's bridging header, but SPM is
      # already disabled below (`flutter config --no-enable-swift-package-manager`),
      # so that failure mode shouldn't apply here.
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          # Disable Flutter's Swift Package Manager integration. These plugins
          # are CocoaPods-only, and SPM's module interfaces clash with the app's
          # bridging header ("Using bridging headers with module interfaces is
          # unsupported"). CocoaPods handles everything.
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: iOS sign-in regression test (real iOS runtime, no device needed)
        script: |
          # Guards against a repeat of the App Review 2.1(a) rejections
          # (builds 13-18): the phone-sign-in hang only ever showed up on iOS,
          # never in Android testing, so "verified on Android" kept shipping
          # builds that failed again in front of App Review. This runs the
          # actual sign-in chain (integration_test/ios_phone_signin_test.dart)
          # on an iOS Simulator — same Dart engine and platform channels as a
          # physical device, just without needing one. A hang or failure here
          # stops the workflow before code signing / IPA build / TestFlight
          # publish, so a broken build never reaches App Review.
          UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available on this image" && exit 1
          fi
          xcrun simctl boot "$UDID" || true
          flutter test integration_test/ios_phone_signin_test.dart -d "$UDID"
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          # Prefer a persistent key from env (IOS_DIST_CERT_KEY) so the cert is
          # reused across builds; fall back to a fresh key if it isn't set.
          if [ -n "$IOS_DIST_CERT_KEY" ]; then
            printf '%s' "$IOS_DIST_CERT_KEY" | openssl base64 -d -A > /tmp/cert_key.pem
          else
            openssl genrsa 2048 > /tmp/cert_key.pem 2>/dev/null
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight automatically. Flip to a production
        # submission later once TestFlight looks good.
        submit_to_testflight: true
        # Leave beta groups empty until you create one in App Store Connect.
