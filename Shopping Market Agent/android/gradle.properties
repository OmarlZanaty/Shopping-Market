# Heap reduced from 8G to 4G after the daemon OOM-crashed mid-build.
# 4G is plenty for a Flutter Android release build and leaves headroom for
# the OS, AVD/emulator, IDE, and the dev's other apps. Metaspace dropped from
# 4G (way too much) to 1G; code cache halved.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Parallel + cache + on-demand make builds faster without raising memory.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true

android.useAndroidX=true
