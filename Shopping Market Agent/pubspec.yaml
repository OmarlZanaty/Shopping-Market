name: shoppingmarketagent
description: "Shopping Market — Preparer & Driver agent app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # Firebase + notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.20
  awesome_notifications: ^0.11.0
  flutter_local_notifications: ^17.0.0
  audioplayers: ^5.2.1

  # Camera + scanner + image
  mobile_scanner: ^4.0.0
  camera: ^0.10.5+9
  flutter_image_compress: ^2.1.0
  image: ^4.1.7
  image_picker: ^1.1.2

  # Location + maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  pin_code_fields: ^8.0.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  vibration: ^3.1.8
  uuid: ^4.3.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
