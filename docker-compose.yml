version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shoppingmarket-db
    restart: always
    environment:
      POSTGRES_DB: shopping_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: StrongPostgresPassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shoppingmarket-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: shoppingmarket-backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - staticfiles:/app/static
      - mediafiles:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_default_store &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000"

  celery-worker:
    build: .
    container_name: shoppingmarket-celery
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  celery-beat:
    build: .
    container_name: shoppingmarket-beat
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l info

  nginx:
    image: nginx:alpine
    container_name: shoppingmarket-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - staticfiles:/app/static:ro
      - mediafiles:/app/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  mediafiles:
